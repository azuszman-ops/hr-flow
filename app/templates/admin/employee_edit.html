{% extends "admin/base.html" %}
{% block title %}Edytuj pracownika — {{ employee.first_name }} {{ employee.last_name }}{% endblock %}
{% block content %}

<div class="mb-6">
    <a href="/admin/{{ tenant.id }}/employees" class="text-sm text-blue-600 hover:underline">← Wróć do listy pracowników</a>
</div>

<div class="max-w-lg">
    <h1 class="text-xl font-bold text-gray-800 mb-6">Edytuj pracownika</h1>

    <div class="bg-white border border-gray-200 rounded-xl p-6">
        <form method="post" action="/admin/{{ tenant.id }}/employees/{{ employee.id }}/edit" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-medium text-gray-500 block mb-1">Imię *</label>
                    <input name="first_name" value="{{ employee.first_name }}" required
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 block mb-1">Nazwisko *</label>
                    <input name="last_name" value="{{ employee.last_name }}" required
                           class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
            </div>
            <div>
                <label class="text-xs font-medium text-gray-500 block mb-1">WhatsApp (+48...)</label>
                <input name="phone_whatsapp" value="{{ employee.phone_whatsapp or '' }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="text-xs font-medium text-gray-500 block mb-1">Viber (+48...)</label>
                <input name="phone_viber" value="{{ employee.phone_viber or '' }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="text-xs font-medium text-gray-500 block mb-1">Email</label>
                <input name="email" type="email" value="{{ employee.email or '' }}"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-blue-600 text-white rounded-lg px-6 py-2 text-sm font-medium hover:bg-blue-700 transition">
                    Zapisz zmiany
                </button>
                <a href="/admin/{{ tenant.id }}/employees"
                   class="bg-gray-100 text-gray-700 rounded-lg px-6 py-2 text-sm font-medium hover:bg-gray-200 transition">
                    Anuluj
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
